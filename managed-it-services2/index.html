<!DOCTYPE html>
<html lang="en" data-accent="cobalt" data-density="compact"><head>
<meta charset="utf-8">
<title>Managed IT Services New York | Cyber Guardian Consulting Group</title>
<meta name="description" content="Full-spectrum managed IT services for small and mid-size businesses in NYC, Hudson Valley, Hudson Yards &amp; Brooklyn. Network, cloud, servers, workstations, backup — 24/7, sub-20-minute response.">
<meta name="viewport" content="width=device-width,initial-scale=1">



<style>
@font-face { font-family:'NL'; font-weight:400; font-style:normal; font-display:swap; src:url('../L.woff2') format('woff2'); }
@font-face { font-family:'NB'; font-weight:700; font-style:normal; font-display:swap; src:url('../nbold.woff2') format('woff2'); }
@font-face { font-family:'Nexa'; font-weight:400; font-display:swap; src:url("e746d49d-470c-47fb-9f25-9848f18cbdd2") format('opentype'); }
@font-face { font-family:'Nexa'; font-weight:700; font-display:swap; src:url("f3c5dc7e-476a-4b4b-9fff-9bf06de29aaa") format('opentype'); }
:root{
  --ink:rgb(21,21,21); --black:#000; --navy:rgb(43,53,78); --navy-deep:rgb(20,27,42);
  --slate:rgb(106,106,132); --paper:rgb(250,250,250); --white:#fff;
  --cream:#ffffff; --cream-deep:#f5f5f5;
  --lime:#C8FF47; --lime-deep:#A6E025;
  --coral:#FF6A55; --coral-soft:#FFD7CF;
  --cobalt:#2E3BFF; --cobalt-soft:#E4E6FF;
  --plum:#2A1F4F; --sky:#BDE4FF;
  --accent:#fff; --accent-glow:rgba(255,255,255,0.18);
  --green:#3ef0a8; --amber:#f3c969; --blue:#8ab4f8;
  --font:'Nexa','Helvetica Neue',Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SF Mono,Menlo,monospace;
  --ease:cubic-bezier(0.22,0.61,0.36,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--font);letter-spacing:-0.018em;-webkit-font-smoothing:antialiased;line-height:1.4}
a{color:inherit;text-decoration:none;cursor:pointer;transition:opacity 120ms var(--ease)}
a:hover{opacity:0.7}
button{font-family:inherit;letter-spacing:inherit;border:0;background:none}
.page{position:relative;width:100%;overflow-x:hidden;background:var(--cream)}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUpText{to{transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes drift{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(8px,-10px) rotate(1deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes dashFlow{to{stroke-dashoffset:-200}}

.reveal{opacity:0;transform:translateY(30px);transition:opacity 700ms var(--ease),transform 700ms var(--ease)}
.reveal.in{opacity:1;transform:none}
.stag > *{opacity:0;transform:translateY(20px);transition:opacity 600ms var(--ease),transform 600ms var(--ease)}
.stag.in > *{opacity:1;transform:none}
.stag.in > *:nth-child(1){transition-delay:0ms}
.stag.in > *:nth-child(2){transition-delay:80ms}
.stag.in > *:nth-child(3){transition-delay:160ms}
.stag.in > *:nth-child(4){transition-delay:240ms}
.stag.in > *:nth-child(5){transition-delay:320ms}
.stag.in > *:nth-child(6){transition-delay:400ms}
.stag.in > *:nth-child(7){transition-delay:480ms}
.stag.in > *:nth-child(8){transition-delay:560ms}

/* Nav */
.site-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:20px 80px;background:rgba(14,22,40,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07);transition:padding 0.2s ease}
.site-nav.scrolled{padding-top:14px;padding-bottom:14px}
.nav-logo img{height:44px;width:auto;display:block}
.nav-links{list-style:none;display:flex;gap:36px;margin:0 auto;padding:0}
.nav-links a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:15px;letter-spacing:-0.01em;transition:color 0.14s ease}
.nav-links a:hover{color:#fff}
.nav-cta{background:#fff;color:#1a1a1a;text-decoration:none;padding:10px 22px;border-radius:6px;font-size:14px;font-family:'NB',sans-serif;white-space:nowrap;transition:background 0.14s ease,transform 0.14s ease}
.nav-cta:hover{background:#e8e8e8;transform:translateY(-1px)}
.nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:10px;margin-left:8px;-webkit-tap-highlight-color:transparent;min-width:44px;min-height:44px;align-items:center}
.nav-burger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:transform 0.22s ease,opacity 0.22s ease,width 0.22s ease}
.site-nav.nav-open .nav-burger span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.site-nav.nav-open .nav-burger span:nth-child(2){opacity:0;width:0}
.site-nav.nav-open .nav-burger span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-drawer{position:fixed;top:0;left:0;right:0;bottom:0;background:#0E1628;z-index:98;display:flex;flex-direction:column;padding:100px 28px 48px;overflow-y:auto;animation:drawerIn 0.28s ease}
@keyframes drawerIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.nav-drawer-links{list-style:none;padding:0;margin:0 0 36px;border-top:1px solid rgba(255,255,255,0.08)}
.nav-drawer-links li{border-bottom:1px solid rgba(255,255,255,0.08)}
.nav-drawer-links a{display:flex;align-items:center;font-size:28px;line-height:1;letter-spacing:-0.022em;color:#fff;text-decoration:none;padding:20px 0;transition:opacity 0.14s ease;min-height:64px}
.nav-drawer-links a:active{opacity:0.6}
.nav-drawer-cta{display:flex;align-items:center;justify-content:center;background:var(--cobalt);color:#fff;text-decoration:none;padding:18px 24px;border-radius:10px;font-size:17px;font-family:'NB',sans-serif;text-align:center;margin-bottom:24px;min-height:56px;transition:background 0.14s ease}
.nav-drawer-cta:active{background:#2030f0}
.nav-drawer-contact{display:flex;flex-direction:column;gap:12px;margin-top:auto;padding-top:28px;border-top:1px solid rgba(255,255,255,0.08)}
.nav-drawer-contact a{color:rgba(255,255,255,0.45);text-decoration:none;font-size:16px;min-height:44px;display:flex;align-items:center;transition:color 0.14s ease}
.nav-drawer-contact a:active{color:rgba(255,255,255,0.8)}
@media(max-width:768px){
  .site-nav{padding:0 20px;height:60px}
  .nav-logo img{height:36px}
  .nav-links,.nav-cta{display:none}
  .nav-burger{display:flex}
}
/* Hero */
.hero{position:relative;padding:254px 0 120px;min-height:760px;overflow:hidden;background:#0E1628;color:#fff}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(255,255,255,0.04),transparent 60%);pointer-events:none}
.hero-grid{display:none}
.hero-burst{position:absolute;right:-80px;top:50%;transform:translateY(-50%);width:780px;height:780px;pointer-events:none;opacity:0.95}
.hero-burst circle{fill:#fff}
.hero-burst .ray{stroke:rgba(255,255,255,0.55);stroke-width:0.7;fill:none}
@keyframes burstSpin{to{transform:translateY(-50%) rotate(360deg)}}
.hero-burst-rot{transform-origin:center center;animation:burstSpin 220s linear infinite}
@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}
.hero-burst .tw{animation:twinkle 3s ease-in-out infinite}
.hero-inner{position:relative;padding-left:129px;max-width:760px;z-index:3}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:12px;letter-spacing:0.18em;font-family:var(--mono);text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:28px;animation:slideUp 700ms var(--ease) 100ms both}
.hero-eyebrow .pip{background:#fff;box-shadow:0 0 10px rgba(255,255,255,0.6)}
.pip{width:8px;height:8px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px rgba(200,255,71,0.7);animation:pulse 1.8s infinite}
.hero-headline{font-size:78px;line-height:0.95;letter-spacing:-0.03em;color:#fff;font-weight:400;margin:0;text-wrap:balance}
.hero-headline span{display:block;overflow:hidden}
.hero-headline span b{font-weight:400;display:inline-block;transform:translateY(110%);animation:slideUpText 900ms var(--ease) both}
.hero-headline span:nth-child(1) b{animation-delay:200ms}
.hero-headline span:nth-child(2) b{animation-delay:320ms}
.hero-headline span:nth-child(3) b{animation-delay:440ms}
.hero-headline em{font-style:normal;color:#fff;font-weight:400}
.hero-sub{font-size:18px;line-height:1.55;color:rgba(255,255,255,0.72);max-width:560px;margin:32px 0 44px;animation:slideUp 700ms var(--ease) 700ms both}
.hero-ctas{display:flex;align-items:center;gap:28px;animation:slideUp 700ms var(--ease) 850ms both}
.btn-cta{font-size:15px;color:#fff;background:transparent;padding:14px 26px;border-radius:50px;cursor:pointer;display:inline-flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:all 300ms var(--ease);border:1px solid rgba(255,255,255,0.35)}
.btn-cta::before{content:'';position:absolute;inset:0;background:#fff;transform:translateY(101%);transition:transform 400ms var(--ease)}
.btn-cta span{position:relative;z-index:1;transition:color 300ms var(--ease)}
.btn-cta:hover::before{transform:none}
.btn-cta:hover span{color:var(--navy-deep)}
.btn-cta:hover{opacity:1}
.btn-link{font-size:15px;color:rgba(255,255,255,0.82);padding:4px 0;cursor:pointer;position:relative}
.btn-link::after{content:'';position:absolute;left:0;bottom:0;width:100%;height:1px;background:#fff;transform:scaleX(0);transform-origin:left;transition:transform 300ms var(--ease)}
.btn-link:hover::after{transform:scaleX(1)}

/* Hero stats overlay */
.hero-stats{position:absolute;right:60px;bottom:80px;display:grid;grid-template-columns:repeat(3,1fr);gap:0;z-index:3;width:680px;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:26px 28px;backdrop-filter:blur(8px);animation:slideUp 700ms var(--ease) 900ms both}
.hstat{padding:0 22px;border-right:1px solid rgba(255,255,255,0.1)}
.hstat:last-child{border-right:0}
.hstat-num{font-size:30px;line-height:1;letter-spacing:-0.025em;color:#fff;font-weight:400;white-space:nowrap;margin-bottom:8px}
.hstat-body{font-size:11px;line-height:1.45;color:rgba(255,255,255,0.55);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em}
.hstat-lbl{display:none}

/* Section utilities */
.sec{padding:110px 100px;position:relative}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:0.2em;font-family:var(--mono);text-transform:uppercase;color:var(--slate);margin-bottom:22px}
.eyebrow::before{content:'';width:24px;height:1px;background:currentColor}
.sec-title{font-size:64px;line-height:0.96;letter-spacing:-0.028em;margin:0;font-weight:400;text-wrap:balance}
.sec-sub{font-size:17px;line-height:1.55;color:var(--slate);max-width:520px;margin-top:24px}
.sec-head{display:grid;grid-template-columns:1.1fr 1fr;gap:80px;align-items:end;margin-bottom:60px}

/* Explainer */
.explain{background:#fff;padding:110px 100px}
.explain-body{display:grid;grid-template-columns:1fr 1fr;gap:80px;margin-bottom:60px}
.explain-body p{font-size:17px;line-height:1.6;color:var(--ink);margin:0 0 18px}
.explain-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.ecard{background:#fff;border:1px solid rgba(46,59,255,0.18);border-radius:22px;padding:32px;transition:background 0.26s ease,border-color 0.26s ease,box-shadow 0.26s ease,transform 0.26s ease;position:relative;overflow:hidden;cursor:default}
.ecard:nth-child(1){background:var(--coral);border-color:var(--coral)}
.ecard:nth-child(2){background:var(--cobalt);border-color:var(--cobalt)}
.ecard:nth-child(3){background:var(--navy);border-color:var(--navy)}
.ecard:hover{background:var(--cobalt);border-color:var(--cobalt);transform:translateY(-6px);box-shadow:0 24px 48px rgba(46,59,255,0.32)}
.ecard:nth-child(2):hover{background:var(--navy);border-color:var(--navy);box-shadow:0 24px 48px rgba(43,53,78,0.32)}
.ecard:nth-child(3):hover{background:var(--cobalt);border-color:var(--cobalt);box-shadow:0 24px 48px rgba(46,59,255,0.32)}
.ecard-icon{width:56px;height:56px;border-radius:14px;background:#f0f2ff;border:1px solid rgba(46,59,255,0.15);color:var(--cobalt);display:flex;align-items:center;justify-content:center;margin-bottom:24px;transition:background 0.26s ease,border-color 0.26s ease,color 0.26s ease,transform 0.26s ease}
.ecard:nth-child(1) .ecard-icon,.ecard:nth-child(2) .ecard-icon,.ecard:nth-child(3) .ecard-icon{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.2);color:#fff}
.ecard:hover .ecard-icon{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.22);color:#fff;transform:rotate(-6deg) scale(1.08)}
.ecard h3{font-size:24px;line-height:1.15;letter-spacing:-0.02em;font-weight:400;margin:0 0 10px;color:var(--ink);transition:color 0.26s ease}
.ecard:nth-child(1) h3,.ecard:nth-child(2) h3,.ecard:nth-child(3) h3{color:#fff}
.ecard p{font-size:14.5px;line-height:1.55;color:var(--slate);margin:0;transition:color 0.26s ease}
.ecard:nth-child(1) p,.ecard:nth-child(2) p,.ecard:nth-child(3) p{color:rgba(255,255,255,0.78)}
.ecard:hover h3{color:#fff}
.ecard:hover p{color:rgba(255,255,255,0.8)}
/* Process (How It Works) */
.process{padding:100px;background:#fff;color:#151515}
.process *{box-sizing:border-box}
.process-head{display:grid;grid-template-columns:1.2fr 1fr;gap:80px;align-items:end;margin-bottom:72px}
.process-title{font-size:clamp(40px,5.2vw,72px);line-height:0.93;letter-spacing:-0.028em;margin:0;color:#151515;font-weight:400}
.process-sub{font-size:17px;line-height:1.6;color:var(--slate);max-width:380px;margin:0}
.process-timeline{position:relative}
.process-line{position:absolute;left:0;right:0;top:38px;height:2px;background:linear-gradient(to right,#FF6A55,#9B59FF,#2E3BFF);opacity:0.18}
.process-progress{position:absolute;left:0;top:37px;height:3px;background:linear-gradient(to right,#FF6A55,#9B59FF,#2E3BFF);background-size:1300px 100%;transition:width 900ms var(--ease);width:0}
.process-steps{display:grid;grid-template-columns:repeat(5,1fr);gap:24px}
.process-step{padding-top:66px;position:relative;cursor:pointer;opacity:0.35;transition:opacity 0.3s ease}
.process-step.active{opacity:1}
.process-step .dot{position:absolute;top:31px;left:0;width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid rgba(43,53,78,0.22);transition:background 0.25s ease,border-color 0.25s ease,box-shadow 0.25s ease,transform 0.25s ease}
.process-step:nth-child(1).active .dot{background:#FF6A55;border-color:#FF6A55;box-shadow:0 0 0 6px rgba(255,106,85,0.18);transform:scale(1.2)}
.process-step:nth-child(2).active .dot{background:#CC5FE0;border-color:#CC5FE0;box-shadow:0 0 0 6px rgba(204,95,224,0.18);transform:scale(1.2)}
.process-step:nth-child(3).active .dot{background:#9B59FF;border-color:#9B59FF;box-shadow:0 0 0 6px rgba(155,89,255,0.18);transform:scale(1.2)}
.process-step:nth-child(4).active .dot{background:#5B64FF;border-color:#5B64FF;box-shadow:0 0 0 6px rgba(91,100,255,0.18);transform:scale(1.2)}
.process-step:nth-child(5).active .dot{background:#2E3BFF;border-color:#2E3BFF;box-shadow:0 0 0 6px rgba(46,59,255,0.15);transform:scale(1.2)}
.process-step .num{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;color:var(--slate);text-transform:uppercase;margin-bottom:10px;transition:color 0.3s ease}
.process-step:nth-child(1).active .num{color:#FF6A55}
.process-step:nth-child(2).active .num{color:#CC5FE0}
.process-step:nth-child(3).active .num{color:#9B59FF}
.process-step:nth-child(4).active .num{color:#5B64FF}
.process-step:nth-child(5).active .num{color:#2E3BFF}
.process-step .step-title{font-size:22px;line-height:1.1;letter-spacing:-0.02em;margin:0 0 10px;color:#151515;font-weight:400;transition:color 0.3s ease}
.process-step:nth-child(1).active .step-title{color:#FF6A55}
.process-step:nth-child(2).active .step-title{color:#CC5FE0}
.process-step:nth-child(3).active .step-title{color:#9B59FF}
.process-step:nth-child(4).active .step-title{color:#5B64FF}
.process-step:nth-child(5).active .step-title{color:#2E3BFF}
.process-step .step-body{font-size:14.5px;line-height:1.55;color:var(--slate);margin:0}
@media(max-width:1024px){.process{padding:80px 60px}}
@media(max-width:960px){.process{padding:80px 48px}.process-head{grid-template-columns:1fr;gap:28px;align-items:start}.process-steps{grid-template-columns:repeat(2,1fr);gap:40px 24px}.process-line,.process-progress{display:none}.process-step{padding-top:0;padding-left:28px;opacity:1}.process-step .dot{top:4px;left:0}}
@media(max-width:768px){.process{padding:60px 24px}}
@media(max-width:600px){.process{padding:64px 24px}.process-steps{grid-template-columns:1fr;gap:32px}}
/* Ticket Section */
.ticket-sec{padding:120px 100px;background:var(--plum);position:relative;overflow:hidden}
.ticket-grid{display:grid;grid-template-columns:5fr 7fr;gap:80px;align-items:center}
.ticket-left h2{font-family:'NB',var(--font);font-size:clamp(32px,3.6vw,52px);font-weight:700;color:#fff;line-height:1.1;letter-spacing:-0.02em;margin:0 0 24px}
.ticket-left p{font-size:14.5px;line-height:1.8;color:rgba(255,255,255,0.6);margin-bottom:16px}
.ticket-callouts{margin-top:48px;display:flex;flex-direction:column;gap:20px}
.t-callout{display:flex;gap:16px;align-items:flex-start;opacity:0;transform:translateX(-16px);transition:opacity 0.5s ease,transform 0.5s ease}
.t-callout.in-view{opacity:1;transform:translateX(0)}
.t-callout-dot{width:8px;height:8px;border-radius:50%;background:var(--cobalt);flex-shrink:0;margin-top:6px}
.t-callout strong{display:block;font-family:'NB',var(--font);font-size:14px;color:#fff;margin-bottom:4px}
.t-callout span{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.5}
.ticket-close{margin-top:48px;padding:24px 28px;border-left:3px solid var(--cobalt);background:rgba(46,59,255,0.08)}
.ticket-close p{font-family:'NB',var(--font);font-size:15px;color:rgba(255,255,255,0.9);margin:0;line-height:1.5;font-style:italic}
.ticket-sim{position:relative;height:320px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden}
.sim-topbar{height:40px;background:rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 16px;gap:8px}
.sim-dot{width:10px;height:10px;border-radius:50%}
.sim-dot.r{background:rgba(255,106,85,0.7)}
.sim-dot.y{background:rgba(200,200,200,0.4)}
.sim-dot.g{background:rgba(50,205,50,0.5)}
.sim-title-bar{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.35);margin-left:12px}
.sim-body{position:relative;height:280px}
.sim-stage{position:absolute;inset:0;padding:28px;opacity:0;transform:translateY(12px);transition:opacity 0.5s ease,transform 0.5s ease;pointer-events:none}
.sim-stage.active{opacity:1;transform:translateY(0);pointer-events:auto}
.sim-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:100px;margin-bottom:16px}
.sim-badge.new{background:rgba(46,59,255,0.2);color:#8a9eff}
.sim-badge.assign{background:rgba(100,150,255,0.15);color:#a0b4ff}
.sim-badge.prog{background:rgba(255,200,50,0.15);color:#ffd060}
.sim-badge.done{background:rgba(50,200,100,0.15);color:#5edb8a}
.sim-badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.sim-ticket-title{font-family:'NB',var(--font);font-size:16px;color:#fff;margin-bottom:8px}
.sim-ticket-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:20px}
.sim-row{display:flex;gap:12px;align-items:center;margin-bottom:10px}

/* Services Section */
.services-sec{background:#fff;border-top:1px solid #e5e5e5}
.services-sec-head{padding:80px 100px 60px;border-bottom:1px solid #e5e5e5}
.services-sec-head h2{font-family:'NB',var(--font);font-size:clamp(28px,3.6vw,52px);font-weight:700;color:#1a1a1a;line-height:1.08;letter-spacing:-0.02em;margin:0 0 16px}
.services-sec-head p{font-size:14.5px;line-height:1.75;color:#555;max-width:600px;margin:0}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr)}
.svc-card{display:block;text-decoration:none;color:inherit;padding:52px 48px;border-bottom:1px solid #e5e5e5;border-right:1px solid #e5e5e5;position:relative;transition:box-shadow 0.14s ease;will-change:transform}
.svc-card::before{content:'';position:absolute;inset:0;z-index:0;opacity:0;transition:opacity 0.9s ease;pointer-events:none}
.svc-card:nth-child(3n){border-right:none}
.svc-card:nth-child(n+6){border-bottom:none}
.svc-card:nth-child(7){border-right:none;border-bottom:none}
.svc-card:nth-child(4n+1)::before{background:#2E3BFF}
.svc-card:nth-child(4n+2)::before{background:#FF6A55}
.svc-card:nth-child(4n+3)::before{background:#2B354E}
.svc-card:nth-child(4n)::before{background:#2B354E}
.svc-card:hover{box-shadow:0 8px 40px rgba(0,0,0,0.18);z-index:1}
.svc-card:hover::before{opacity:1}
.svc-card > *{position:relative;z-index:1}
.svc-icon{width:44px;height:44px;margin-bottom:24px;color:var(--cobalt);transition:color 0.18s ease}
.svc-card:hover .svc-icon{color:#fff}
.svc-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.svc-num{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#767676;transition:color 0.18s ease}
.svc-arrow{font-size:18px;color:#1a1a1a;display:inline-block;transition:transform 0.14s ease,color 0.18s ease}
.svc-card:hover .svc-num{color:rgba(255,255,255,0.5)}
.svc-card:hover .svc-arrow{transform:translate(3px,-3px);color:#fff}
.svc-card h3{font-family:'NB',var(--font);font-size:clamp(18px,2vw,28px);font-weight:700;color:#1a1a1a;line-height:1.2;margin:0 0 6px;display:inline-block;position:relative;transition:color 0.18s ease}
.svc-card h3::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;background:#1a1a1a;transition:width 0.18s ease,background 0.18s ease}
.svc-card:hover h3{color:#fff}
.svc-card:hover h3::after{width:100%;background:rgba(255,255,255,0.4)}
.svc-headline{font-family:var(--mono);font-size:11px;letter-spacing:0.08em;color:#767676;margin-bottom:16px;line-height:1.4;transition:color 0.18s ease}
.svc-card p{font-size:14.5px;line-height:1.75;color:#555;margin-bottom:20px;transition:color 0.18s ease}
.svc-card:hover .svc-headline{color:rgba(255,255,255,0.65)}
.svc-card:hover p{color:rgba(255,255,255,0.8)}
.plain-note{background:rgba(46,59,255,0.06);border-left:3px solid var(--cobalt);border-radius:0 6px 6px 0;padding:14px 18px;margin-top:16px}
.plain-note-label{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--cobalt);margin-bottom:6px}
.plain-note p{font-size:13px;line-height:1.6;color:#555;margin:0;transition:color 0.18s ease}
.svc-card:hover .plain-note{background:rgba(255,255,255,0.1);border-left-color:rgba(255,255,255,0.4)}
.svc-card:hover .plain-note-label{color:rgba(255,255,255,0.6)}
.svc-card:hover .plain-note p{color:rgba(255,255,255,0.7)}
.svc-specs{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:6px}
.svc-spec{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#555;background:rgba(43,53,78,0.07);border:1px solid rgba(43,53,78,0.12);padding:4px 10px;border-radius:4px;transition:color 0.18s ease,background 0.18s ease,border-color 0.18s ease}
.svc-card:hover .svc-spec{color:rgba(255,255,255,0.88);background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
@keyframes icon-pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes icon-spin{to{transform:rotate(360deg);transform-origin:24px 24px}}
@keyframes icon-rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes icon-blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes icon-dash{0%{stroke-dashoffset:120}100%{stroke-dashoffset:0}}
.svc-card:hover .i-pulse{animation:icon-pulse 1.6s ease infinite}
.svc-card:hover .i-spin{animation:icon-spin 3s linear infinite}
.svc-card:hover .i-rise{animation:icon-rise 1.8s ease infinite}
.svc-card:hover .i-blink{animation:icon-blink 1.2s ease infinite}
.svc-card:hover .i-dash{animation:icon-dash 1.2s ease forwards}

/* Going Beyond — illustrated bullet rows */
.beyond{background:var(--navy-deep);color:#fff;padding:130px 100px;position:relative;overflow:hidden}
.beyond::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.05),transparent 65%);pointer-events:none}
.beyond-head{display:grid;grid-template-columns:1.1fr 1fr;gap:80px;align-items:end;margin-bottom:80px;position:relative;z-index:2}
.beyond .sec-title{color:#fff}
.beyond .eyebrow{color:rgba(255,255,255,0.65)}
.beyond .eyebrow::before{background:rgba(255,255,255,0.4)}
.beyond-head p{font-size:16.5px;line-height:1.6;color:rgba(255,255,255,0.7);margin:0;max-width:480px}
.beyond-rows{position:relative;z-index:2;display:flex;flex-direction:column}
.brow{display:grid;grid-template-columns:80px 1fr 1.2fr 220px;gap:40px;align-items:center;padding:36px 0;border-top:1px solid rgba(255,255,255,0.1);transition:all 500ms var(--ease);cursor:default;opacity:0;transform:translateY(40px)}
.brow.in{opacity:1;transform:none}
.brow:last-child{border-bottom:1px solid rgba(255,255,255,0.1)}
.brow:hover{padding-left:24px}
.brow-num{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;color:rgba(255,255,255,0.4);text-transform:uppercase}
.brow:hover .brow-num{color:rgba(255,255,255,0.9)}
.brow-title{font-size:30px;line-height:1.1;letter-spacing:-0.022em;font-weight:400;color:#fff;margin:0;transition:transform 400ms var(--ease)}
.brow:hover .brow-title{transform:translateX(8px)}
.brow-desc{font-size:14.5px;line-height:1.5;color:rgba(255,255,255,0.6);margin:0}
.brow-illus{position:relative;height:80px;display:flex;align-items:center;justify-content:flex-end;color:rgba(255,255,255,0.85)}
.brow-illus svg{transition:transform 600ms var(--ease)}
.brow:hover .brow-illus svg{transform:scale(1.08)}
.brow .brow-illus .anim-stroke{stroke-dasharray:240;stroke-dashoffset:240;transition:stroke-dashoffset 1200ms var(--ease)}
.brow.in .brow-illus .anim-stroke{stroke-dashoffset:0}
.brow .brow-illus .anim-fill{opacity:0;transition:opacity 800ms var(--ease) 600ms}
.brow.in .brow-illus .anim-fill{opacity:1}
.beyond-quote{margin-top:80px;padding:40px 50px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-left:3px solid var(--cobalt);border-radius:18px;font-size:24px;line-height:1.4;letter-spacing:-0.018em;color:#fff;position:relative;z-index:2}
.beyond-quote em{font-style:normal;color:var(--sky)}

/* Industries grid (re-used) */
.indg{padding:110px 100px;background:#fff}
.indg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:50px}
.itile{position:relative;background:#fff;border:1px solid rgba(46,59,255,0.16);border-radius:20px;overflow:hidden;cursor:pointer;transition:background 0.24s ease,border-color 0.24s ease,box-shadow 0.24s ease,transform 0.24s ease;padding:30px;min-height:240px}

.itile:hover .iname{color:#fff}
.itile:hover .iblurb{color:rgba(255,255,255,0.8)}
/* Why CGCG */
.why{background:#fff;color:var(--ink);padding:110px 100px;border-top:1px solid #e5e5e5}
.why .sec-title{color:var(--ink)}

.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:60px}
.wcard{background:#fff;border:1px solid rgba(46,59,255,0.18);border-radius:20px;padding:36px;transition:background 0.22s ease,border-color 0.22s ease,box-shadow 0.22s ease,transform 0.22s ease;cursor:default;position:relative;overflow:hidden}

/* CTA */
.cta{padding:120px 100px 100px;background:var(--cream);text-align:center;position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;left:50%;top:50%;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(43,53,78,0.08),transparent 65%);transform:translate(-50%,-50%);pointer-events:none;animation:drift 14s ease-in-out infinite}

const { useState, useEffect, useRef, useMemo } = React;

function useInView(threshold = 0.15){
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((es) => es.forEach((e) => {
      if (e.isIntersecting) { setSeen(true); io.disconnect(); }
    }), { threshold });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, seen];
}
function Reveal({ children, className='', as:Tag='div', stagger=false, style }){
  const [ref, seen] = useInView();
  return <Tag ref={ref} className={`${stagger?'stag':'reveal'} ${seen?'in':''} ${className}`} style={style}>{children}</Tag>;
}

/* ---------- How it works ---------- */
function How(){
  const steps = [
    { num:'01', title:'Discovery', body:'We audit your current stack, risks, and gaps — no sales pitch, just a clear picture of where you stand.' },
    { num:'02', title:'Plan', body:'We build a 90-day roadmap with your team — prioritized by risk, sequenced by impact, and priced without surprises.' },
    { num:'03', title:'Deploy', body:'Our engineers execute the rollout in parallel with your operations. Zero downtime is the standard, not the goal.' },
    { num:'04', title:'Operate', body:'24/7 monitoring, patching, and response from day one. You get a named team that knows your environment.' },
    { num:'05', title:'Evolve', body:'Quarterly reviews keep your stack ahead of threats and aligned with where your business is going — not where it was.' },
  ];
  const [active, setActive] = useState(0);
  const [ref, seen] = useInView(0.3);
  useEffect(() => {
    if (!seen) return;
    let i = 0;
    const t = setInterval(() => {
      setActive(i); i++;
      if (i >= steps.length){ clearInterval(t); setActive(steps.length-1); }
    }, 1200);
    return () => clearInterval(t);
  }, [seen]);
  const pct = active === 0 ? 0 : (active / (steps.length - 1)) * 100;
  return (
    <section className="process" id="how" data-screen-label="03 How">
      <div className="process-head">
        <div>
          <div className="eyebrow">How It Works</div>
          <h2 className="process-title">Getting started<br/>is simpler<br/>than you think.</h2>
        </div>
        <p className="process-sub">Switching IT providers — or bringing in a managed partner for the first time — can feel like a big step. We’ve designed onboarding to be transparent, low-disruption, and fast.</p>
      </div>
      <div ref={ref} className="process-timeline">
        <div className="process-line"/>
        <div className="process-progress" style={{ width: pct+"%" }}/>
        <div className="process-steps">
          {steps.map((s, i) =>
            <div key={s.num} className={`process-step ${i<=active?'active':''}`} onMouseEnter={() => setActive(i)}>
              <div className="dot"/>
              <div className="num">STEP {s.num}</div>
              <h3 className="step-title">{s.title}</h3>
              <p className="step-body">{s.body}</p>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

function SiteNav(){
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  useEffect(() => {
    document.body.style.overflow = open ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  return (
    <nav className={['site-nav',scrolled&&'scrolled',open&&'nav-open'].filter(Boolean).join(' ')}>
      <a className="nav-logo" href="/">
        <img src="/logowhite.svg" alt="CGCG"/>

      <button className="nav-burger" aria-label={open?'Close menu':'Open menu'} onClick={()=>setOpen(o=>!o)}>
        <span/><span/><span/>
      </button>
      {open && (
        <div className="nav-drawer">
          <ul className="nav-drawer-links">
            <li><a href="/services/" onClick={()=>setOpen(false)}>Services</a></li>

  );
}
